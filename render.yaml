services:
  - type: web
    name: awaaz-backend2
    runtime: node
    rootDir: awaaz-backend2
    buildCommand: npm install
    startCommand: npm start
    plan: free
    autoDeploy: true

  - type: web
    name: awaaz-ml-api
    runtime: python
    rootDir: ML
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api:app --host 0.0.0.0 --port $PORT
    plan: free
    autoDeploy: true
